global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "ultimate-bravery-cookbook"
    static_configs:
      - targets: ["${APP_HOST}:3000"]

  - job_name: "node_exporter"
    static_configs:
      - targets:
          - "${NGINX_PRIVATE_HOST}:9100"
          - "${APP_HOST}:9100"
          - "${DB_HOST}:9100"
        labels:
          subnet: "10.0.1.0/24"
