global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "ultimate-bravery-cookbook"
    static_configs:
      - targets: ["<app-vm-ip>:3000"]

  - job_name: "node_exporter"
    static_configs:
      - targets:
          - "<nginx-vm-ip>:9100"
          - "<app-vm-ip>:9100"
          - "<postgres-vm-ip>:9100"
        labels:
          subnet: "10.0.1.0/24"
