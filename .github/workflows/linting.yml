name: Go Linting and Quality

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint_go:
    name: Go quality checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@v5 # TODO: pin to commit SHA via: gh api repos/actions/setup-go/git/ref/tags/v5 --jq .object.sha
        with:
          go-version-file: ./app/go.mod

      - name: Run go vet
        working-directory: ./app
        run: go vet ./...

      - name: Run tests with race detector and measure coverage
        working-directory: ./app
        run: |
          go test -race -coverprofile=coverage.out ./...
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{gsub(/%/,""); print $3}')
          echo "Total coverage: ${COVERAGE}%"
          awk -v c="$COVERAGE" 'BEGIN { if (c+0 < 30) { print "Coverage " c "% is below the 30% minimum threshold"; exit 1 } }'

      - name: Check for known vulnerabilities
        working-directory: ./app
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  hadolint:
    name: Lint Dockerfiles
    needs: lint_go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: hadolint/hadolint-action@v3.1.0 # TODO: pin to commit SHA
        with:
          dockerfile: "app/Dockerfile"
          failure-threshold: error
