name: Build, Push to GHCR, and Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

# For PRs: cancel the previous run when a new commit is pushed to the same branch.
# For deploys: queue rather than cancel so an in-flight deploy is never interrupted.
concurrency:
  group: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || 'deploy' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Tests are intentionally omitted here: ci.yml runs the full quality gate
  # (lint, tests, coverage, govulncheck) on every push and must be set as a
  # required status check on master via branch protection rules.
  # Note: workflow_dispatch bypasses branch protection — only trigger manually
  # on commits that have already passed CI.

  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build locally first so Trivy can scan it before it is published
      - name: Build image locally
        uses: docker/build-push-action@v6 # TODO: pin to commit SHA
        with:
          context: ./app
          push: false
          load: true
          tags: ghcr.io/dendanskemetode/legacyproject:${{ github.sha }}

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.28.0 # TODO: pin to commit SHA
        with:
          image-ref: ghcr.io/dendanskemetode/legacyproject:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      # Only push if the vulnerability scan passed — skipped on pull requests
      - name: Push image to GHCR
        if: github.event_name != 'pull_request'
        run: |
          docker tag ghcr.io/dendanskemetode/legacyproject:${{ github.sha }} ghcr.io/dendanskemetode/legacyproject:latest
          docker push ghcr.io/dendanskemetode/legacyproject:${{ github.sha }}
          docker push ghcr.io/dendanskemetode/legacyproject:latest

  deploy:
    if: github.event_name != 'pull_request'
    needs: build-and-push
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            host_secret: SSH_HOST_BACKEND
          # nginx VM will be added here once configured
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Copy docker-compose.yaml to ${{ matrix.name }} VM
        uses: appleboy/scp-action@v0.1.7 # TODO: pin to commit SHA
        with:
          host: ${{ secrets[matrix.host_secret] }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.AZURE_KEY }}
          source: "docker-compose.yaml"
          target: "~/legacyProject/"

      - name: Deploy to ${{ matrix.name }} VM
        uses: appleboy/ssh-action@v1.0.3 # TODO: pin to commit SHA
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        with:
          host: ${{ secrets[matrix.host_secret] }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.AZURE_KEY }}
          envs: ENV_FILE
          script: |
            # Write .env from secret — printf avoids a trailing newline and never echoes the value
            printf '%s' "$ENV_FILE" > ~/legacyProject/.env

            sudo docker login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"

            # Pull latest-stable now so it is available locally if rollback is needed.
            # On the very first deploy this tag does not exist yet — the pull is a no-op.
            sudo docker pull ghcr.io/dendanskemetode/legacyproject:latest-stable 2>/dev/null || true

            cd ~/legacyProject
            sudo docker compose pull

            # --wait blocks until all services with healthchecks are healthy.
            # If the app fails its healthcheck within the configured retries, roll back
            # to latest-stable (the last confirmed-healthy image).
            if ! sudo docker compose up -d --force-recreate --wait --wait-timeout 60; then
              echo "Deployment failed health check — rolling back to latest-stable"
              if sudo docker image inspect ghcr.io/dendanskemetode/legacyproject:latest-stable > /dev/null 2>&1; then
                sudo docker tag ghcr.io/dendanskemetode/legacyproject:latest-stable ghcr.io/dendanskemetode/legacyproject:latest
                sudo docker compose up -d --force-recreate --wait
              fi
              exit 1
            fi

  promote-and-notify:
    if: always() && github.event_name != 'pull_request'
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      # Promote latest-stable only once ALL VMs are confirmed healthy
      - name: Promote latest-stable tag
        if: needs.deploy.result == 'success'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker pull ghcr.io/dendanskemetode/legacyproject:${{ github.sha }}
          docker tag  ghcr.io/dendanskemetode/legacyproject:${{ github.sha }} ghcr.io/dendanskemetode/legacyproject:latest-stable
          docker push ghcr.io/dendanskemetode/legacyproject:latest-stable

      # Notify via Discord webhook if DISCORD_WEBHOOK_URL secret is configured; silently skipped otherwise.
      - name: Notify deployment status
        run: |
          STATUS="${{ needs.deploy.result }}"
          SHA="${{ github.sha }}"
          ACTOR="${{ github.actor }}"
          WEBHOOK="${{ secrets.DISCORD_WEBHOOK_URL }}"
          if [ -n "$WEBHOOK" ]; then
            curl -s -X POST "$WEBHOOK" \
              -H "Content-Type: application/json" \
              -d "{\"content\":\"Deploy **${STATUS}** — \`${SHA:0:7}\` by ${ACTOR}\"}"
          fi
