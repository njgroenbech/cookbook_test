name: Build, Push to GHCR, and Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

# For PRs: cancel the previous run when a new commit is pushed to the same branch.
# For deploys: queue rather than cancel so an in-flight deploy is never interrupted.
concurrency:
  group: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || 'deploy' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Tests are intentionally omitted here: ci.yml runs the full quality gate
  # (lint, tests, coverage, govulncheck) on every push and must be set as a
  # required status check on master via branch protection rules.
  # Note: workflow_dispatch bypasses branch protection — only trigger manually
  # on commits that have already passed CI.

  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build both images locally first so Trivy can scan them before anything is published

      - name: Build app image locally
        uses: docker/build-push-action@v6 # TODO: pin to commit SHA
        with:
          context: ./app
          push: false
          load: true
          tags: ghcr.io/dendanskemetode/legacyproject:${{ github.sha }}

      - name: Scan app image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0 # TODO: pin to commit SHA
        with:
          image-ref: ghcr.io/dendanskemetode/legacyproject:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Build nginx image locally
        uses: docker/build-push-action@v6 # TODO: pin to commit SHA
        with:
          context: ./network
          push: false
          load: true
          tags: ghcr.io/dendanskemetode/legacyproject-nginx:${{ github.sha }}

      - name: Scan nginx image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0 # TODO: pin to commit SHA
        with:
          image-ref: ghcr.io/dendanskemetode/legacyproject-nginx:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      # Only push if both vulnerability scans passed — skipped on pull requests
      - name: Push images to GHCR
        if: github.event_name != 'pull_request'
        run: |
          docker tag ghcr.io/dendanskemetode/legacyproject:${{ github.sha }} ghcr.io/dendanskemetode/legacyproject:latest
          docker push ghcr.io/dendanskemetode/legacyproject:${{ github.sha }}
          docker push ghcr.io/dendanskemetode/legacyproject:latest

          docker tag ghcr.io/dendanskemetode/legacyproject-nginx:${{ github.sha }} ghcr.io/dendanskemetode/legacyproject-nginx:latest
          docker push ghcr.io/dendanskemetode/legacyproject-nginx:${{ github.sha }}
          docker push ghcr.io/dendanskemetode/legacyproject-nginx:latest

  deploy:
    if: github.event_name != 'pull_request'
    needs: build-and-push
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: app
            host_secret: SSH_HOST_APP
            compose_dir: app
            image: ghcr.io/dendanskemetode/legacyproject
            use_proxy: true
          - name: database
            host_secret: SSH_HOST_POSTGRES
            compose_dir: database
            image: ""
            use_proxy: true
          - name: monitoring
            host_secret: SSH_HOST_MONITORING
            compose_dir: monitoring
            image: ""
            use_proxy: true
          - name: network
            host_secret: SSH_HOST_NGINX
            compose_dir: network
            image: ghcr.io/dendanskemetode/legacyproject-nginx
            use_proxy: false
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Copy docker-compose.yaml to ${{ matrix.name }} VM
        uses: appleboy/scp-action@v0.1.7 # TODO: pin to commit SHA
        with:
          host: ${{ secrets[matrix.host_secret] }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.AZURE_KEY }}
          proxy_host: ${{ matrix.use_proxy && secrets.SSH_PROXY_HOST || '' }}
          proxy_username: ${{ matrix.use_proxy && secrets.VM_USER || '' }}
          proxy_key: ${{ matrix.use_proxy && secrets.AZURE_KEY || '' }}
          source: "${{ matrix.compose_dir }}/docker-compose.yaml"
          target: "~/legacyProject/${{ matrix.compose_dir }}/"
          strip_components: 1

      # prometheus.yml is a runtime config file that must live alongside the compose file
      - name: Copy prometheus.yml to monitoring VM
        if: matrix.name == 'monitoring'
        uses: appleboy/scp-action@v0.1.7 # TODO: pin to commit SHA
        with:
          host: ${{ secrets[matrix.host_secret] }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.AZURE_KEY }}
          proxy_host: ${{ secrets.SSH_PROXY_HOST }}
          proxy_username: ${{ secrets.VM_USER }}
          proxy_key: ${{ secrets.AZURE_KEY }}
          source: "monitoring/prometheus.yml"
          target: "~/legacyProject/monitoring/"
          strip_components: 1

      - name: Deploy to ${{ matrix.name }} VM
        uses: appleboy/ssh-action@v1.0.3 # TODO: pin to commit SHA
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          GRAFANA_PASSWORD: ${{ secrets.GRAFANA_PASSWORD }}
          APP_HOST: ${{ secrets.APP_PRIVATE_IP }}
          MONITORING_HOST: ${{ secrets.MONITORING_PRIVATE_IP }}
        with:
          host: ${{ secrets[matrix.host_secret] }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.AZURE_KEY }}
          proxy_host: ${{ matrix.use_proxy && secrets.SSH_PROXY_HOST || '' }}
          proxy_username: ${{ matrix.use_proxy && secrets.VM_USER || '' }}
          proxy_key: ${{ matrix.use_proxy && secrets.AZURE_KEY || '' }}
          envs: DB_HOST,DB_PORT,DB_USER,DB_PASSWORD,DB_NAME,GRAFANA_PASSWORD,APP_HOST,MONITORING_HOST
          script: |
            mkdir -p ~/legacyProject/${{ matrix.compose_dir }}

            # Write .env from individual secrets — printf '%s\n' is safe for values containing special characters
            {
              printf 'PORT=3000\n'
              printf 'DB_HOST=%s\n'                    "$DB_HOST"
              printf 'DB_PORT=%s\n'                    "$DB_PORT"
              printf 'DB_USER=%s\n'                    "$DB_USER"
              printf 'DB_PASSWORD=%s\n'                "$DB_PASSWORD"
              printf 'DB_NAME=%s\n'                    "$DB_NAME"
              printf 'POSTGRES_USER=%s\n'              "$DB_USER"
              printf 'POSTGRES_PASSWORD=%s\n'          "$DB_PASSWORD"
              printf 'POSTGRES_DB=%s\n'                "$DB_NAME"
              printf 'GF_SECURITY_ADMIN_PASSWORD=%s\n' "$GRAFANA_PASSWORD"
              printf 'APP_HOST=%s\n'                   "$APP_HOST"
              printf 'MONITORING_HOST=%s\n'           "$MONITORING_HOST"
            } > ~/legacyProject/${{ matrix.compose_dir }}/.env

            sudo docker login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"

            # Pull latest-stable now so it is available locally if rollback is needed.
            # Only applies to services with a custom image (app and network).
            # On the very first deploy this tag does not exist yet — the pull is a no-op.
            IMAGE="${{ matrix.image }}"
            if [ -n "$IMAGE" ]; then
              sudo docker pull "$IMAGE:latest-stable" 2>/dev/null || true
            fi

            cd ~/legacyProject/${{ matrix.compose_dir }}
            sudo docker compose pull

            # --wait blocks until all services with healthchecks are healthy.
            # If the healthcheck never passes within 60 seconds, roll back to
            # latest-stable (the last confirmed-healthy image).
            if ! sudo docker compose up -d --force-recreate --wait --wait-timeout 60; then
              echo "Deployment failed health check — rolling back to latest-stable"
              if [ -n "$IMAGE" ] && sudo docker image inspect "$IMAGE:latest-stable" > /dev/null 2>&1; then
                sudo docker tag "$IMAGE:latest-stable" "$IMAGE:latest"
                sudo docker compose up -d --force-recreate --wait
              fi
              exit 1
            fi

  promote-and-notify:
    if: always() && github.event_name != 'pull_request' && needs.deploy.result != 'skipped'
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      # Promote latest-stable for both custom images only once ALL VMs are confirmed healthy
      - name: Promote latest-stable tags
        if: needs.deploy.result == 'success'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

          docker pull ghcr.io/dendanskemetode/legacyproject:${{ github.sha }}
          docker tag  ghcr.io/dendanskemetode/legacyproject:${{ github.sha }} ghcr.io/dendanskemetode/legacyproject:latest-stable
          docker push ghcr.io/dendanskemetode/legacyproject:latest-stable

          docker pull ghcr.io/dendanskemetode/legacyproject-nginx:${{ github.sha }}
          docker tag  ghcr.io/dendanskemetode/legacyproject-nginx:${{ github.sha }} ghcr.io/dendanskemetode/legacyproject-nginx:latest-stable
          docker push ghcr.io/dendanskemetode/legacyproject-nginx:latest-stable

      # Notify via Discord webhook if DISCORD_WEBHOOK_URL secret is configured; silently skipped otherwise.
      # On failure, fetches a random GIF from Giphy (requires GIPHY_API_KEY secret).
      - name: Notify deployment status
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          STATUS="${{ needs.deploy.result }}"
          SHA="${{ github.sha }}"
          ACTOR="${{ github.actor }}"
          BRANCH="${{ github.ref_name }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          WEBHOOK="${{ secrets.DISCORD_WEBHOOK_URL }}"
          GIPHY_KEY="${{ secrets.GIPHY_API_KEY }}"
          SOURCE_BRANCH=$(echo "$COMMIT_MSG" | head -1 | sed -n 's/Merge pull request #[0-9]* from [^/]*\/\(.*\)/\1/p')
          PR_NUMBER=$(echo "$COMMIT_MSG" | head -1 | sed -n 's/Merge pull request #\([0-9]*\) from .*/\1/p')
          if [ -n "$SOURCE_BRANCH" ]; then
            BRANCH_LINE="\n\`${SOURCE_BRANCH}\` → \`${BRANCH}\`"
          else
            BRANCH_LINE=""
          fi
          if [ -n "$PR_NUMBER" ]; then
            BOT_NAME="Frida #${PR_NUMBER}"
          else
            BOT_NAME="Frida"
          fi
          if [ -n "$WEBHOOK" ]; then
            TEXT="Deploy **${STATUS}** — \`${SHA:0:7}\` by ${ACTOR} — [View run](${RUN_URL})${BRANCH_LINE}"
            GIF=""
            if [ -n "$GIPHY_KEY" ]; then
              if [ "$STATUS" = "failure" ]; then
                GIF=$(curl -s "https://api.giphy.com/v1/gifs/random?api_key=${GIPHY_KEY}&tag=fail&rating=g" \
                      | jq -r '.data.images.original.url // empty')
              else
                GIF=$(curl -s "https://api.giphy.com/v1/gifs/random?api_key=${GIPHY_KEY}&tag=success+celebration&rating=g" \
                      | jq -r '.data.images.original.url // empty')
              fi
            fi
            if [ -n "$GIF" ]; then
              PAYLOAD="{\"username\":\"${BOT_NAME}\",\"content\":\"${TEXT}\",\"embeds\":[{\"image\":{\"url\":\"${GIF}\"}}]}"
            else
              PAYLOAD="{\"username\":\"${BOT_NAME}\",\"content\":\"${TEXT}\"}"
            fi
            curl -s -X POST "$WEBHOOK" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD"
          fi
