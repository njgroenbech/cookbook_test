name: Build, Push to GHCR, and Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

# Prevent concurrent deploys — if a new push arrives while a deploy is running,
# queue it rather than cancel the in-flight one.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@v5 # TODO: pin to commit SHA
        with:
          go-version-file: ./app/go.mod

      - name: Run tests with race detector
        working-directory: ./app
        run: go test -race ./...

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set image tag
        id: meta
        run: echo "sha_tag=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build locally first so Trivy can scan it before it is published
      - name: Build image locally
        uses: docker/build-push-action@v6 # TODO: pin to commit SHA
        with:
          context: ./app
          push: false
          load: true
          tags: ghcr.io/dendanskemetode/legacyproject:${{ github.sha }}

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.28.0 # TODO: pin to commit SHA
        with:
          image-ref: ghcr.io/dendanskemetode/legacyproject:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      # Only push if the vulnerability scan passed
      - name: Push image to GHCR
        run: |
          docker tag ghcr.io/dendanskemetode/legacyproject:${{ github.sha }} ghcr.io/dendanskemetode/legacyproject:latest
          docker push ghcr.io/dendanskemetode/legacyproject:${{ github.sha }}
          docker push ghcr.io/dendanskemetode/legacyproject:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to backend VM
        uses: appleboy/ssh-action@v1.0.3 # TODO: pin to commit SHA
        with:
          host: ${{ secrets.SSH_HOST_BACKEND }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.AZURE_KEY }}
          script: |
            sudo docker login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"
            cd ~/legacyProject
            sudo git pull

            # Record image ID of the currently running version for rollback
            PREV_IMAGE=$(docker images ghcr.io/dendanskemetode/legacyproject:latest --format "{{.ID}}" 2>/dev/null || true)

            sudo docker compose pull

            # --wait blocks until all services with healthchecks are healthy (requires Docker Compose v2.1+).
            # If the app fails its healthcheck within the configured retries, we roll back automatically.
            if ! sudo docker compose up -d --force-recreate --wait --wait-timeout 60; then
              echo "Deployment failed health check — rolling back to previous image"
              if [ -n "$PREV_IMAGE" ]; then
                docker tag "$PREV_IMAGE" ghcr.io/dendanskemetode/legacyproject:latest
                sudo docker compose up -d --force-recreate
              fi
              exit 1
            fi

      - name: Deploy to nginx VM
        uses: appleboy/ssh-action@v1.0.3 # TODO: pin to commit SHA
        with:
          host: ${{ secrets.SSH_HOST_NGINX }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.AZURE_KEY }}
          script: |
            sudo docker login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"
            cd ~/legacyProject
            sudo git pull

            PREV_IMAGE=$(docker images ghcr.io/dendanskemetode/legacyproject:latest --format "{{.ID}}" 2>/dev/null || true)

            sudo docker compose pull

            if ! sudo docker compose up -d --force-recreate --wait --wait-timeout 60; then
              echo "Deployment failed health check — rolling back to previous image"
              if [ -n "$PREV_IMAGE" ]; then
                docker tag "$PREV_IMAGE" ghcr.io/dendanskemetode/legacyproject:latest
                sudo docker compose up -d --force-recreate
              fi
              exit 1
            fi

      # Only promote latest-stable once both VMs are confirmed healthy
      - name: Promote latest-stable tag
        if: success()
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker pull ghcr.io/dendanskemetode/legacyproject:${{ github.sha }}
          docker tag  ghcr.io/dendanskemetode/legacyproject:${{ github.sha }} ghcr.io/dendanskemetode/legacyproject:latest-stable
          docker push ghcr.io/dendanskemetode/legacyproject:latest-stable

      # Notify via Discord webhook if DISCORD_WEBHOOK_URL secret is configured; silently skipped otherwise.
      - name: Notify deployment status
        if: always()
        run: |
          STATUS="${{ job.status }}"
          SHA="${{ github.sha }}"
          ACTOR="${{ github.actor }}"
          WEBHOOK="${{ secrets.DISCORD_WEBHOOK_URL }}"
          if [ -n "$WEBHOOK" ]; then
            curl -s -X POST "$WEBHOOK" \
              -H "Content-Type: application/json" \
              -d "{\"content\":\"Deploy **${STATUS}** — \`${SHA:0:7}\` by ${ACTOR}\"}"
          fi
