name: Build, Push to GHCR, and Deploy
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ./app/go.mod
      - name: Run tests
        working-directory: ./app
        run: go test ./...

  build-and-push:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.sha_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set image tag
        id: meta
        run: echo "sha_tag=${GITHUB_SHA}" >> $GITHUB_OUTPUT
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            ghcr.io/dendanskemetode/legacyproject:${{ github.sha }}
            ghcr.io/dendanskemetode/legacyproject:latest
      - name: Build and push nginx image
        uses: docker/build-push-action@v5
        with:
          context: ./network
          push: true
          tags: |
            ghcr.io/dendanskemetode/legacyproject-nginx:${{ github.sha }}
            ghcr.io/dendanskemetode/legacyproject-nginx:latest

  deploy:
    needs: build-and-push
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to app VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST_APP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.AZURE_KEY }}
          proxy_host: ${{ secrets.SSH_PROXY_HOST }}
          proxy_username: ${{ secrets.VM_USER }}
          proxy_key: ${{ secrets.AZURE_KEY }}
          script: |
            sudo docker login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"
            cd ~/legacyProject/app
            git pull
            sudo docker compose pull
            sudo docker compose up -d --force-recreate

      - name: Deploy to nginx VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST_NGINX }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.AZURE_KEY }}
          script: |
            sudo docker login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"
            cd ~/legacyProject/network
            git pull
            sudo docker compose pull
            sudo docker compose up -d --force-recreate
